services:
  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution_user
      POSTGRES_PASSWORD: super_secure_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  evolution-api:
    # Versão pinada: :latest pode trazer 2.4.0-rc com breaking changes
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=sua_super_global_api_key_aqui
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution_user:super_secure_db_password@evolution-db:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_SAVE_INSTANCES=false
      # Nomenclatura v2 (as antigas STORE_* eram v1 e são ignoradas)
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_DATA_LABELS=false
      - CLEAN_CONNECTION=true
      # Fingerprint realista do "dispositivo vinculado" — mitiga 401 no pareamento.
      # NÃO setar CONFIG_SESSION_PHONE_VERSION: removida na v2.3.1 (versão WA Web é automática)
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://backend:3000/api/whatsapp/webhook
      # byEvents=true postaria em subpaths (/connection-update) que o backend não roteia
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
    depends_on:
      - evolution-db
      - evolution-redis
    restart: always

  backend:
    build: ./backend
    container_name: voz-segura-backend
    # Docker Desktop roda containers numa VM: network_mode host não exporia a porta
    # na LAN real. Com ports, o Desktop publica 3000 em todas as interfaces do notebook.
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcloud/adc.json
      # Na rede do compose a Evolution é alcançada pelo nome do serviço
      - EVOLUTION_API_URL=http://evolution-api:8080
      # URL pela qual a Evolution (container vizinho) alcança este backend
      - WEBHOOK_BASE_URL=http://backend:3000
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcloud/adc.json:ro
    depends_on:
      - evolution-api
    restart: always

volumes:
  postgres_data:
  redis_data:
