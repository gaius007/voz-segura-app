version: '3.8'

services:
  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution_user
      POSTGRES_PASSWORD: super_secure_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=sua_super_global_api_key_aqui
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution_user:super_secure_db_password@evolution-db:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_SAVE_INSTANCES=false
      - STORE_MESSAGES=false
      - STORE_CHATS=false
      - STORE_CONTACTS=false
      - CLEAN_CONNECTION=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:3000/api/whatsapp/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
    depends_on:
      - evolution-db
      - evolution-redis
    restart: always

volumes:
  postgres_data:
  redis_data:
